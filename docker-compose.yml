version: "3.8"

services:
  redis:
    image: redis:7.4-alpine
    container_name: griffin-gold-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-griffingold_redis_secret}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-griffingold_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: griffin-gold-backend
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-griffingold_redis_secret}@redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app/models/weights:/app/app/models/weights
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build: ./webapp
    container_name: griffin-gold-webapp
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
