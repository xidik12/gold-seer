<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="440" viewBox="0 0 1200 440"
     role="img" aria-labelledby="ptitle pdesc">
  <title id="ptitle">How Griffin Gold works</title>
  <desc id="pdesc">A three-stage pipeline. Stage one: 17 collectors gather 60-plus signals — gold price, FRED macro (real yields, CPI, DXY), COT positioning, ETF flows, central-bank gold buying, physical premium, news and Reddit sentiment, and trading-session data. Stage two: a feature builder feeds a weighted ensemble of four models — TFT 40 percent, XGBoost 25 percent, LSTM 20 percent, and TimesFM 15 percent — modified by a sentiment layer and a quant-theory overlay. Stage three: outputs are 1h, 4h and 24h predictions, trading signals with entry, target and stop, an AI trade advisor, optional MetaApi broker execution, and self-tracked accuracy.</desc>

  <defs>
    <linearGradient id="pgold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="440" rx="22" fill="#0f0f14"/>
  <rect x="1" y="1" width="1198" height="438" rx="21" fill="none" stroke="#2a2a38" stroke-width="1"/>

  <!-- stage labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2.5" fill="#D4AF37">
    <text x="64"  y="52">01 · COLLECT</text>
    <text x="470" y="52">02 · ENSEMBLE</text>
    <text x="898" y="52">03 · DELIVER</text>
  </g>

  <!-- flow arrows -->
  <g stroke="url(#pgold)" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M408 232 L462 232"/>
    <path d="M840 232 L892 232"/>
  </g>
  <g fill="#D4AF37">
    <path d="M462 232 l-9 -5 v10 z"/>
    <path d="M892 232 l-9 -5 v10 z"/>
  </g>

  <!-- STAGE 1: signal sources -->
  <g transform="translate(64 74)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="0" y="0" width="344" height="316" rx="14" fill="#15151f" stroke="#2a2a38" stroke-width="1"/>
    <text x="20" y="34" font-size="15" font-weight="700" fill="#f5f3ee">17 collectors · 60+ signals</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#c0c0d0">
      <text x="20" y="72">◆ XAUUSD spot price &amp; volume</text>
      <text x="20" y="100">◆ FRED macro — yields, CPI, DXY, M2</text>
      <text x="20" y="128">◆ COT positioning (COMEX)</text>
      <text x="20" y="156">◆ Gold ETF flows &amp; miners</text>
      <text x="20" y="184">◆ Central-bank gold buying</text>
      <text x="20" y="212">◆ Physical premium</text>
      <text x="20" y="240">◆ News &amp; Reddit sentiment</text>
      <text x="20" y="268">◆ Trading sessions &amp; calendar</text>
    </g>
    <text x="20" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11.5" fill="#9090a8">collected hourly →</text>
  </g>

  <!-- STAGE 2: ensemble -->
  <g transform="translate(470 74)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="0" y="0" width="370" height="316" rx="14" fill="#15151f" stroke="#2a2a38" stroke-width="1"/>
    <text x="20" y="34" font-size="15" font-weight="700" fill="#f5f3ee">Weighted 4-model ensemble</text>

    <!-- model bars -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text x="20" y="76" fill="#c0c0d0">TFT</text>
      <text x="350" y="76" text-anchor="end" fill="#D4AF37" font-weight="700">40%</text>
      <rect x="20" y="84" width="330" height="8" rx="4" fill="#25252f"/>
      <rect x="20" y="84" width="264" height="8" rx="4" fill="url(#pgold)"/>

      <text x="20" y="122" fill="#c0c0d0">XGBoost</text>
      <text x="350" y="122" text-anchor="end" fill="#D4AF37" font-weight="700">25%</text>
      <rect x="20" y="130" width="330" height="8" rx="4" fill="#25252f"/>
      <rect x="20" y="130" width="165" height="8" rx="4" fill="url(#pgold)"/>

      <text x="20" y="168" fill="#c0c0d0">LSTM</text>
      <text x="350" y="168" text-anchor="end" fill="#D4AF37" font-weight="700">20%</text>
      <rect x="20" y="176" width="330" height="8" rx="4" fill="#25252f"/>
      <rect x="20" y="176" width="132" height="8" rx="4" fill="url(#pgold)"/>

      <text x="20" y="214" fill="#c0c0d0">TimesFM</text>
      <text x="350" y="214" text-anchor="end" fill="#D4AF37" font-weight="700">15%</text>
      <rect x="20" y="222" width="330" height="8" rx="4" fill="#25252f"/>
      <rect x="20" y="222" width="99" height="8" rx="4" fill="url(#pgold)"/>
    </g>

    <line x1="20" y1="252" x2="350" y2="252" stroke="#2a2a38" stroke-width="1"/>
    <text x="20" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" fill="#9090a8">+ sentiment modifier  (±50%)</text>
    <text x="20" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" fill="#9090a8">+ quant-theory signal overlay</text>
  </g>

  <!-- STAGE 3: outputs -->
  <g transform="translate(900 74)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="0" y="0" width="236" height="316" rx="14" fill="#15151f" stroke="#2a2a38" stroke-width="1"/>
    <text x="20" y="34" font-size="15" font-weight="700" fill="#f5f3ee">Delivered in-chat</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">
      <text x="20" y="74"  fill="#00d68f">▸</text><text x="40" y="74"  fill="#c0c0d0">1h / 4h / 24h forecasts</text>
      <text x="20" y="112" fill="#00d68f">▸</text><text x="40" y="112" fill="#c0c0d0">Signals: entry / TP / SL</text>
      <text x="20" y="150" fill="#00d68f">▸</text><text x="40" y="150" fill="#c0c0d0">AI trade advisor</text>
      <text x="20" y="188" fill="#00d68f">▸</text><text x="40" y="188" fill="#c0c0d0">MetaApi execution</text>
      <text x="20" y="226" fill="#00d68f">▸</text><text x="40" y="226" fill="#c0c0d0">Price &amp; event alerts</text>
      <text x="20" y="264" fill="#00d68f">▸</text><text x="40" y="264" fill="#c0c0d0">Self-tracked accuracy</text>
    </g>
    <text x="20" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11.5" fill="#9090a8">Telegram · web mini-app</text>
  </g>
</svg>
